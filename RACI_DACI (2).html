<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACI / DACI Matrix</title>
<style>
:root{
  --blue-dark:#1c3664;--blue-mid:#1a5276;--blue-light:#2e86c1;
  --blue-pale:#d6eaf8;--bg:#f4f6f8;--text:#1a1a2e;--muted:#5d6d7e;
  --border:#d5d8dc;--red:#c0392b;--font:'Segoe UI',Calibri,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px}

/* HEADER */
.hdr{background:var(--blue-dark);color:#fff;border-radius:6px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hdr-left{flex:1;min-width:200px}
.hdr h1{font-size:16px;font-weight:700;margin-bottom:4px;outline:none;cursor:text;display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25)}
.hdr h1::after{content:'✎';font-size:11px;opacity:.5;font-weight:400}
.hdr h1:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.5)}
.hdr h1:focus{background:rgba(255,255,255,.15);border-color:#7ec8f0;box-shadow:0 0 0 2px rgba(126,200,240,.25)}
.hdr h1:focus::after{display:none}
.hdr-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px;font-size:11px}
.hdr-meta span[contenteditable]{outline:none;cursor:text;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);opacity:.85}
.hdr-meta span[contenteditable]:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.45)}
.hdr-meta span[contenteditable]:focus{background:rgba(255,255,255,.15);border-color:#7ec8f0;opacity:1}
.hdr-meta .sep{opacity:.35}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.hdr-scope{display:flex;gap:10px;flex-wrap:wrap;min-width:260px;max-width:420px}
.scope-box{flex:1;min-width:110px}
.scope-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.6;margin-bottom:4px}
.scope-text{background:rgba(255,255,255,.12);border:1px dashed rgba(255,255,255,.4);border-radius:5px;padding:6px 10px;font-size:11px;line-height:1.5;min-height:38px;outline:none;color:#fff;cursor:text}
.scope-text:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.7)}
.scope-text:focus{background:rgba(255,255,255,.15);border-color:#7ec8f0;border-style:solid}

/* MODE TOGGLE */
.mode-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:20px;padding:3px;gap:2px}
.mode-btn{font-family:var(--font);font-size:11px;font-weight:700;padding:5px 16px;border-radius:16px;border:none;cursor:pointer;letter-spacing:.04em;transition:all .18s;color:rgba(255,255,255,.6);background:transparent}
.mode-btn.active{background:#fff;color:var(--blue-dark);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.mode-btn:not(.active):hover{color:#fff;background:rgba(255,255,255,.15)}

/* LEGEND */
.legend-wrap{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.legend{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-right:4px}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:3px;display:inline-flex;align-items:center;gap:5px;position:relative;cursor:default}
.badge:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;font-size:10px;font-weight:400;white-space:nowrap;padding:4px 9px;border-radius:4px;pointer-events:none;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.badge:hover::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1a2e;pointer-events:none;z-index:99}
.b-r{background:#e74c3c;color:#fff}
.b-a{background:#e67e22;color:#fff}
.b-c{background:#27ae60;color:#fff}
.b-i{background:#2e86c1;color:#fff}
.b-d{background:#8e44ad;color:#fff}
.badge-desc{font-weight:400;opacity:.85;font-size:9px}
.mode-label{font-size:11px;font-weight:700;color:var(--muted);padding:4px 12px;border-radius:12px;background:var(--blue-pale);color:var(--blue-dark)}

/* ROLE PANEL */
.role-panel{background:#fff;border:1px solid var(--border);border-radius:6px;margin-bottom:14px;padding:12px 16px}
.role-panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px}
.role-grid{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.role-item{display:flex;flex-direction:column;gap:0;min-width:110px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:6px 8px}
.role-fn-inp{font-family:var(--font);font-size:12px;font-weight:700;border:none;border-bottom:1px dashed var(--border);border-radius:0;padding:2px 4px;color:var(--blue-dark);background:transparent;width:100%;margin-bottom:4px}
.role-fn-inp:focus{outline:none;border-bottom-color:var(--blue-light);background:rgba(46,134,193,.06)}
.role-fn-inp::placeholder{color:#bbb;font-weight:400}
.role-name-inp{font-family:var(--font);font-size:11px;border:none;border-radius:3px;padding:2px 4px;color:var(--muted);background:transparent;width:100%}
.role-name-inp:focus{outline:none;background:rgba(46,134,193,.06);color:var(--text)}
.role-name-inp::placeholder{color:#ccc}
.btn-add-role{font-family:var(--font);font-size:11px;font-weight:600;background:var(--blue-light);color:#fff;border:none;border-radius:3px;padding:5px 12px;cursor:pointer;white-space:nowrap;align-self:flex-end}
.btn-add-role:hover{background:var(--blue-mid)}

/* TABLE */
.tbl-wrap{background:#fff;border:1px solid var(--border);border-radius:6px;overflow:auto;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--blue-dark);color:#fff}
thead th{padding:8px 10px;text-align:left;font-weight:500;font-size:11px;border-right:1px solid rgba(255,255,255,.12)}
thead th:last-child{border-right:none}
thead th.topic-col{font-size:13px;font-weight:600;width:28%}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(odd){background:#fff}
tbody tr:nth-child(even){background:var(--bg)}
tbody td{padding:6px 10px;vertical-align:middle;border-right:1px solid var(--border)}
tbody td:last-child{border-right:none}
.col-head-name{display:block;font-size:9px;opacity:.65;font-weight:400;margin-top:2px;font-style:italic}

/* topic cell */
.topic-div{outline:none;border:1px dashed var(--border);border-radius:3px;padding:4px 7px;font-size:12px;cursor:text;line-height:1.4;background:#fafafa;color:var(--muted);display:flex;align-items:center;gap:5px}
.topic-div::after{content:'✎';font-size:10px;opacity:.3;flex-shrink:0}
.topic-div:hover{border-color:var(--blue-light);background:#f0f6fb;color:var(--text)}
.topic-div:focus{border-color:var(--blue-light);border-style:solid;background:#fff;color:var(--text);box-shadow:0 0 0 2px rgba(46,134,193,.15)}
.topic-div:focus::after{display:none}

/* RACI / DACI buttons */
.cell-toggle{display:flex;flex-direction:column;gap:2px}
.cell-btn{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;border:1px solid #e0e0e0;cursor:pointer;background:#f0f0f0;color:#bbb;transition:all .12s;text-align:left}
.cell-btn:hover{border-color:#aaa;color:#888;background:#e8e8e8}
/* RACI active */
.cell-btn.active.r{background:#e74c3c;color:#fff;border-color:#e74c3c}
.cell-btn.active.a{background:#e67e22;color:#fff;border-color:#e67e22}
.cell-btn.active.c{background:#27ae60;color:#fff;border-color:#27ae60}
.cell-btn.active.i{background:#2e86c1;color:#fff;border-color:#2e86c1}
/* DACI active */
.cell-btn.active.d{background:#8e44ad;color:#fff;border-color:#8e44ad}
/* A same orange, C same green, I same blue */

.del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:0 3px;transition:color .12s}
.del-btn:hover{color:var(--red)}

/* add bar */
.add-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.add-inp{flex:1;min-width:160px;font-family:var(--font);font-size:12px;border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--text);background:#fff}
.add-inp:focus{outline:2px solid var(--blue-light)}
.btn-add-topic{background:var(--blue-light);color:#fff;border:none;border-radius:4px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer}
.btn-add-topic:hover{background:var(--blue-mid)}

/* actions */
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-primary{background:var(--blue-mid);color:#fff;border:none;border-radius:4px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:#fff;color:var(--blue-mid);border:1px solid var(--blue-mid);border-radius:4px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer}
.btn-secondary:hover{background:var(--blue-pale)}

.foot{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;display:block;width:fit-content;margin:10px auto;padding:4px 14px;border-radius:4px;border:1px dashed var(--border);cursor:text;background:#f8f8f8;outline:none;transition:all .15s}
.foot:hover{border-color:var(--blue-light);background:#eef5fb;color:var(--text)}
.foot:focus{border-color:var(--blue-light);border-style:solid;background:#fff;color:var(--text);box-shadow:0 0 0 2px rgba(46,134,193,.15)}

@media print{
  @page{size:A4 landscape;margin:6mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{zoom:68%}
  .add-bar,.actions,.btn-add-role,.del-btn,.mode-toggle{display:none!important}
  .wrap{padding:0;max-width:100%}
  .hdr{border-radius:0}
  .tbl-wrap{overflow:visible!important;border:none}
  .cell-btn{print-color-adjust:exact!important}
  [contenteditable]{outline:none!important;box-shadow:none!important;border-color:transparent!important;background:transparent!important}
  [contenteditable]::after{display:none!important}
  .topic-div{color:var(--text)!important}
  .role-name-inp{border:none!important;background:transparent!important}
}

/* LOGO */
.hdr{align-items:center}
.hdr-logo{display:flex;align-items:center;padding-right:16px;margin-right:4px;border-right:1px solid rgba(255,255,255,.2);flex-shrink:0}
.hdr-logo img{height:32px;display:block;mix-blend-mode:screen}
</style>
</head>

    },
    legend: [
      {l:'R', cls:'b-r', desc:'Responsible'},
      {l:'A', cls:'b-a', desc:'Accountable'},
      {l:'C', cls:'b-c', desc:'Consulted'},
      {l:'I', cls:'b-i', desc:'Informed'},
    ],
    roleLabel: 'Role',
    panelTitle: 'Roles — Function (top) · Person name (below) · × to remove'
  },
  daci: {
    letters: ['D','A','C','I'],
    colors:  {D:'d', A:'a', C:'c', I:'i'},
    tips: {
      D:'Driver — drives the process & coordinates',
      A:'Approver — final decision authority',
      C:'Contributor — provides expertise & input',
      I:'Informed — notified of outcome'
    },
    legend: [
      {l:'D', cls:'b-d', desc:'Driver'},
      {l:'A', cls:'b-a', desc:'Approver'},
      {l:'C', cls:'b-c', desc:'Contributor'},
      {l:'I', cls:'b-i', desc:'Informed'},
    ],
    roleLabel: 'Role',
    panelTitle: 'Stakeholders — Function (top) · Person name (below) · × to remove'
  }
};

// ── STATE ────────────────────────────────────────────────────────
let mode = 'raci';
let roles = [
  {id:'r0', label:'R&D', name:''},
  {id:'r1', label:'Quality', name:''},
  {id:'r2', label:'PMO', name:''},
  {id:'r3', label:'Operations', name:''},
];
let topics = [
  {id:'t0', text:'Define product requirements'},
  {id:'t1', text:'Approve design specification'},
  {id:'t2', text:'Release for production'},
];
let matrix = {}; // matrix[topicId][roleId] = {raci:[], daci:[]}
let nextRoleId=4, nextTopicId=3;

function ensureCell(tid,rid){
  if(!matrix[tid]) matrix[tid]={};
  if(!matrix[tid][rid]) matrix[tid][rid]={raci:[],daci:[]};
}

// ── MODE SWITCH ──────────────────────────────────────────────────
function setMode(m){
  mode = m;
  document.getElementById('btn-raci').classList.toggle('active', m==='raci');
  document.getElementById('btn-daci').classList.toggle('active', m==='daci');
  // update title placeholder
  const titleEl = document.getElementById('hdr-title');
  if(titleEl.textContent.trim()==='RACI Matrix'||titleEl.textContent.trim()==='DACI Matrix')
    titleEl.textContent = m==='raci'?'RACI Matrix':'DACI Matrix';
  renderAll();
}

// ── LEGEND ───────────────────────────────────────────────────────
function renderLegend(){
  const def = MODES[mode];
  const el = document.getElementById('legend');
  el.innerHTML = `<span class="lbl">${mode.toUpperCase()}</span>`;
  def.legend.forEach(item=>{
    const b = document.createElement('span');
    b.className = 'badge '+item.cls;
    b.title = MODES[mode].tips[item.l];
    b.style.cursor = 'default';
    b.innerHTML = `<strong>${item.l}</strong> <span class="badge-desc">${item.desc}</span>`;
    el.appendChild(b);
  });
}

// ── ROLES ────────────────────────────────────────────────────────
function renderRoles(){
  const def = MODES[mode];
  document.getElementById('role-panel-title').textContent = def.panelTitle;
  const grid = document.getElementById('role-grid');
  grid.innerHTML = '';
  roles.forEach((r,ri)=>{
    const item = document.createElement('div');item.className='role-item';

    // top row: label + delete
    const top = document.createElement('div');
    top.style.cssText='display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:3px';
    const fnInp = document.createElement('input');fnInp.className='role-fn-inp';
    fnInp.type='text';fnInp.placeholder='Function…';fnInp.value=r.label;
    fnInp.title='Function / Role (e.g. Quality, R&D, PMO)';
    fnInp.oninput=e=>{r.label=e.target.value||r.label;renderThead();};
    const del = document.createElement('button');del.className='del-btn';del.textContent='×';del.title='Remove';
    del.onclick=()=>{
      if(roles.length<=1){alert('Need at least one role.');return;}
      roles=roles.filter(x=>x.id!==r.id);renderAll();
    };
    top.appendChild(fnInp);top.appendChild(del);

    // name input below
    const nameInp = document.createElement('input');nameInp.className='role-name-inp';
    nameInp.type='text';nameInp.placeholder='Person name…';nameInp.value=r.name;
    nameInp.title='Person name';
    nameInp.oninput=e=>{r.name=e.target.value;renderThead();};

    item.appendChild(top);item.appendChild(nameInp);
    grid.appendChild(item);
  });

  const addBtn=document.createElement('button');addBtn.className='btn-add-role';
  addBtn.textContent='+ Add '+def.roleLabel;
  addBtn.onclick=()=>{
    roles.push({id:'r'+nextRoleId++,label:def.roleLabel,name:''});
    renderAll();
  };
  grid.appendChild(addBtn);
}

// ── TABLE ────────────────────────────────────────────────────────
function renderThead(){
  const def=MODES[mode];
  const thead=document.getElementById('thead');
  thead.innerHTML='';
  const tr=document.createElement('tr');tr.className='main-head';
  const thT=document.createElement('th');thT.className='topic-col';thT.textContent='Topic';
  tr.appendChild(thT);
  roles.forEach(r=>{
    const th=document.createElement('th');
    const label=document.createElement('div');label.style.cssText='font-size:12px;font-weight:600';label.textContent=r.label;
    const ns=document.createElement('span');ns.className='col-head-name';ns.textContent=r.name||'';
    th.appendChild(label);th.appendChild(ns);tr.appendChild(th);
  });
  const thD=document.createElement('th');thD.style.width='24px';tr.appendChild(thD);
  thead.appendChild(tr);
}

function renderTbody(){
  const def=MODES[mode];
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  topics.forEach((t,ti)=>{
    const tr=document.createElement('tr');

    // topic cell
    const tdT=document.createElement('td');
    const div=document.createElement('div');div.className='topic-div';
    div.contentEditable='true';div.spellcheck=false;div.textContent=t.text;
    div.onblur=e=>{topics[ti].text=e.target.textContent.trim();};
    div.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();div.blur();}};
    tdT.appendChild(div);tr.appendChild(tdT);

    // role cells
    roles.forEach(r=>{
      ensureCell(t.id,r.id);
      const td=document.createElement('td');
      const tog=document.createElement('div');tog.className='cell-toggle';
      const active=matrix[t.id][r.id][mode]||[];
      def.letters.forEach(l=>{
        const btn=document.createElement('button');
        const colorClass=def.colors[l];
        btn.className='cell-btn'+(active.includes(l)?' active '+colorClass:'');
        btn.textContent=l;btn.title=def.tips[l];
        btn.onclick=()=>{
          ensureCell(t.id,r.id);
          const arr=matrix[t.id][r.id][mode];
          const idx=arr.indexOf(l);
          if(idx>=0) arr.splice(idx,1); else arr.push(l);
          renderTbody();
        };
        tog.appendChild(btn);
      });
      td.appendChild(tog);tr.appendChild(td);
    });

    // del
    const tdD=document.createElement('td');
    const delBtn=document.createElement('button');delBtn.className='del-btn';delBtn.textContent='×';
    delBtn.onclick=()=>{topics.splice(ti,1);renderTbody();};
    tdD.appendChild(delBtn);tr.appendChild(tdD);
    tbody.appendChild(tr);
  });
}

function renderTable(){renderThead();renderTbody();}
function renderAll(){renderLegend();renderRoles();renderTable();}

function addTopic(){
  const inp=document.getElementById('new-topic');
  const text=inp.value.trim();if(!text)return;
  topics.push({id:'t'+nextTopicId++,text});
  inp.value='';renderTbody();
}

// ── JSON ─────────────────────────────────────────────────────────
function exportJSON(){
  const data={
    mode,
    title:document.getElementById('hdr-title').textContent.trim(),
    version:document.getElementById('hdr-ver').textContent.trim(),
    date:document.getElementById('hdr-date').textContent.trim(),
    org:document.getElementById('hdr-org').textContent.trim(),
    scope:{in:document.getElementById('scope-in').textContent.trim(),out:document.getElementById('scope-out').textContent.trim()},
    roles,topics,matrix
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(mode+'-matrix-'+(data.version||'export')+'.json');
  a.click();URL.revokeObjectURL(a.href);
}

function importJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.mode&&MODES[d.mode]) mode=d.mode;
      if(d.title) document.getElementById('hdr-title').textContent=d.title;
      if(d.date)  document.getElementById('hdr-date').textContent=d.date;
      if(d.version) document.getElementById('hdr-ver').textContent=d.version;
      if(d.org)   document.getElementById('hdr-org').textContent=d.org;
      if(d.scope){
        if(d.scope.in!==undefined) document.getElementById('scope-in').textContent=d.scope.in;
        if(d.scope.out!==undefined) document.getElementById('scope-out').textContent=d.scope.out;
      }
      if(d.roles) roles=d.roles;
      if(d.topics) topics=d.topics;
      if(d.matrix) matrix=d.matrix;
      document.getElementById('btn-raci').classList.toggle('active',mode==='raci');
      document.getElementById('btn-daci').classList.toggle('active',mode==='daci');
      renderAll();
    }catch(err){alert('Invalid JSON: '+err.message);}
    input.value='';
  };
  reader.readAsText(file);
}

// ── INIT ─────────────────────────────────────────────────────────
const TODAY=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
document.getElementById('hdr-date').textContent=TODAY;
document.getElementById('hdr-ver').textContent='v1.0';
renderAll();
</script>
